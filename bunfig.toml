[test]
preload = ["./tests/setup.ts"]
coverage = true

# Only run unit tests (exclude e2e and integration)
root = "./tests/unit"
# Coverage settings - only include src/ files
coverageSkipTestFiles = true
coverageDir = "./src"

# Performance optimizations
rerunOnChange = true
timeout = 30000

[install]
# Cache optimization - prefer offline mode when packages are cached
auto = "fallback"

[install.cache]
# Enable disk cache to prevent cold starts
disable = false